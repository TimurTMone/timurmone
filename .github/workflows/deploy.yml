name: Deploy to Hetzner (timurmone.com)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-timurmone
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH → Pull → Build → Reload
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Trigger deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}

      - name: Verify server is responding
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --resolve timurmone.com:80:${{ secrets.SSH_HOST }} \
            -H 'Host: timurmone.com' \
            http://timurmone.com/)
          echo "Hetzner server returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Not responding with 200"
            exit 1
          fi
